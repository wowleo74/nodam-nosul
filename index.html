<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>노담 노술</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3f6ed6">

<style>

html, body{
height:100%;
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#eef1f6;
}

.header{
background:#3f6ed6;
color:white;
text-align:center;
padding:16px;
font-size:20px;
font-weight:1000;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.container{
max-width:360px;
height:calc(100vh - 60px);
margin:auto;
padding:12px;
display:grid;
grid-template-columns:1fr;
gap:14px;
}

.card{
background:white;
border-radius:18px;
padding:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
display:flex;
flex-direction:column;
justify-content:center;
}

.title{
font-size:32px;
font-weight:900;
margin-bottom:6px;
}

.status{
font-size:20px;
color:#666;
margin-bottom:18px;
font-weight:600;
}

.time{
font-size:32px;
font-weight:900;
margin-bottom:10px;
}

.stat{
font-size:18px;
font-weight:600;
color:#444;
margin-bottom:12px;
}

.button{
padding:12px;
border-radius:12px;
text-align:center;
font-weight:700;
cursor:pointer;
margin-top:6px;
font-size:15px;
transition:0.12s;
}

.button:active{
transform:scale(0.92);
filter:brightness(0.85);
}

.smokeBtn{
background:#ff6b6b;
color:white;
}

.drinkBtn{
background:#6c5ce7;
color:white;
}

.resetBtn{
background:#e9edf2;
color:#333;
}

</style>
</head>

<body>

<div class="header">
노담 · 노술
</div>

<div class="container">

<div class="card">

<div class="title">🚭 금연</div>
<div class="status">금연중</div>

<div class="time" id="smokeTime">0일 00:00</div>

<div class="stat">
오늘 🚬 : <b id="todaySmoke">0</b>개
</div>

<div class="button smokeBtn" onclick="recordSmoke()">🚬 담배 피움</div>
<div class="button resetBtn" onclick="resetSmoke()">🔄 다시 시작</div>

</div>


<div class="card">

<div class="title">🍺 금주</div>
<div class="status">금주중</div>

<div class="time" id="drinkDay">0일</div>

<div class="stat">
7일 🍺 : <b id="weekDrink">0</b>회
<span id="lastDrink"></span>
</div>

<div class="button drinkBtn" onclick="recordDrink()">🍺 술 마심</div>
<div class="button resetBtn" onclick="resetDrink()">🔄 다시 시작</div>

</div>

</div>

<script>

function getTime(ms){

let sec=Math.floor(ms/1000)
let min=Math.floor(sec/60)
let hour=Math.floor(min/60)
let day=Math.floor(hour/24)

hour%=24
min%=60

return {day,hour,min}

}

function recordDrink(){

if(navigator.vibrate) navigator.vibrate(40)

let logs=JSON.parse(localStorage.getItem("drinkLogs"))||[]
logs.push(Date.now())

localStorage.setItem("drinkLogs",JSON.stringify(logs))

updateStats()

}

function recordSmoke(){

if(navigator.vibrate) navigator.vibrate(40)

let logs=JSON.parse(localStorage.getItem("smokeLogs"))||[]

logs.push(Date.now())

localStorage.setItem("smokeLogs",JSON.stringify(logs))

updateStats()

}

function resetSmoke(){

localStorage.setItem("smokeStart",Date.now())
localStorage.removeItem("smokeLogs")
update()

}

function resetDrink(){

localStorage.setItem("drinkStart",Date.now())
localStorage.removeItem("drinkLogs")
update()

}

function updateStats(){

let smokeLogs=JSON.parse(localStorage.getItem("smokeLogs"))||[]
let drinkLogs=JSON.parse(localStorage.getItem("drinkLogs"))||[]

let today=new Date()
today.setHours(0,0,0,0)

let todayCount=0

smokeLogs.forEach(t=>{
if(t>today.getTime()){
todayCount++
}
})

document.getElementById("todaySmoke").innerText=todayCount

let lastText=""

if(drinkLogs.length>0){

let last=drinkLogs[drinkLogs.length-1]

let d=new Date(last)

let m=d.getMonth()+1
let day=d.getDate()

lastText=" (마지막 "+m+"/"+day+")"

}

document.getElementById("lastDrink").innerText=lastText

let week=7*24*60*60*1000
let now=Date.now()

let weekCount=0

drinkLogs.forEach(t=>{
if(now-t<week){
weekCount++
}
})

document.getElementById("weekDrink").innerText=weekCount

}

function update(){

let smokeStart=localStorage.getItem("smokeStart")
let drinkStart=localStorage.getItem("drinkStart")

if(!smokeStart){
smokeStart=Date.now()
localStorage.setItem("smokeStart",smokeStart)
}

if(!drinkStart){
drinkStart=Date.now()
localStorage.setItem("drinkStart",drinkStart)
}

let now=Date.now()

let smokeTime=getTime(now-smokeStart)
let drinkTime=getTime(now-drinkStart)

let h=String(smokeTime.hour).padStart(2,"0")
let m=String(smokeTime.min).padStart(2,"0")

document.getElementById("smokeTime").innerText=
smokeTime.day+"일 "+h+":"+m

document.getElementById("drinkDay").innerText=
drinkTime.day+"일"

updateStats()

}

setInterval(update,1000)
update()

</script>

<script>

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js")
}

</script>

</body>
</html>

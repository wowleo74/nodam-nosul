<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>노담 노술</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3f6ed6">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#eef1f6;
}

.header{
background:#3f6ed6;
color:white;
text-align:center;
padding:16px;
font-size:20px;
font-weight:1000;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.container{
max-width:360px;
margin:auto;
padding:12px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:white;
border-radius:16px;
padding:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
}

.title{
font-size:16px;
font-weight:700;
margin-bottom:2px;
}

.status{
font-size:11px;
color:#666;
margin-bottom:6px;
}

.time{
margin:6px 0;
}

.day{
font-size:28px;
font-weight:800;
}

.hour{
font-size:18px;
font-weight:600;
color:#444;
}

.stat{
font-size:18px;
font-weight:600;
color:#444;
margin-bottom:10px;
}

.button{
padding:9px;
border-radius:10px;
text-align:center;
font-weight:600;
cursor:pointer;
margin-top:6px;
font-size:14px;
transition:0.12s;
}

.button:active{
transform:scale(0.95);
}

.smokeBtn{
background:#ff6b6b;
color:white;
}

.drinkBtn{
background:#6c5ce7;
color:white;
}

.resetBtn{
background:#e9edf2;
color:#333;
}

.log{
margin-top:10px;
font-size:11px;
border-top:1px solid #eee;
padding-top:6px;
}

.logItem{
background:#f7f8fb;
border-radius:8px;
padding:5px;
text-align:center;
font-size:11px;
margin-top:4px;
}

</style>
</head>

<body>

<div class="header">
노담 · 노술
</div>

<div class="container">

<div class="card">

<div class="title">🚭 금연</div>
<div class="status">금연중</div>

<div class="time">
<div class="day" id="smokeDay">0일</div>
<div class="hour" id="smokeHour">0시간 0분</div>
</div>

<div class="stat">
오늘 담배 : <b id="todaySmoke">0</b>개
</div>

<div class="button smokeBtn" onclick="recordSmoke()">🚬 담배 피움</div>
<div class="button resetBtn" onclick="resetSmoke()">🔄 다시 시작</div>

<div class="log">
최근 기록
<div id="smokeLog"></div>
</div>

</div>


<div class="card">

<div class="title">🍺 금주</div>
<div class="status">금주중</div>

<div class="time">
<div class="day" id="drinkDay">0일</div>
<div class="hour" id="drinkHour">0시간 0분</div>
</div>

<div class="stat">
최근 7일 음주 : <b id="weekDrink">0</b>회
</div>

<div class="button drinkBtn" onclick="recordDrink()">🍺 술 마심</div>
<div class="button resetBtn" onclick="resetDrink()">🔄 다시 시작</div>

<div class="log">
최근 기록
<div id="drinkLog"></div>
</div>

</div>

</div>

<script>

function getTime(ms){

let sec=Math.floor(ms/1000)
let min=Math.floor(sec/60)
let hour=Math.floor(min/60)
let day=Math.floor(hour/24)

hour%=24
min%=60

return {day,hour,min}

}

function recordSmoke(){

let logs=JSON.parse(localStorage.getItem("smokeLogs"))||[]
logs.push(Date.now())

localStorage.setItem("smokeLogs",JSON.stringify(logs))

updateLogs()

}

function recordDrink(){

let logs=JSON.parse(localStorage.getItem("drinkLogs"))||[]
logs.push(Date.now())

localStorage.setItem("drinkLogs",JSON.stringify(logs))

updateLogs()

}

function resetSmoke(){

localStorage.setItem("smokeStart",Date.now())
localStorage.removeItem("smokeLogs")
update()

}

function resetDrink(){

localStorage.setItem("drinkStart",Date.now())
localStorage.removeItem("drinkLogs")
update()

}

function updateLogs(){

let smokeLogs=JSON.parse(localStorage.getItem("smokeLogs"))||[]
let drinkLogs=JSON.parse(localStorage.getItem("drinkLogs"))||[]

let smokeArea=document.getElementById("smokeLog")
let drinkArea=document.getElementById("drinkLog")

smokeArea.innerHTML=""
drinkArea.innerHTML=""

smokeLogs.slice(-5).reverse().forEach(t=>{
let d=new Date(t)
smokeArea.innerHTML+=`<div class="logItem">${d.toLocaleString()}</div>`
})

drinkLogs.slice(-5).reverse().forEach(t=>{
let d=new Date(t)
drinkArea.innerHTML+=`<div class="logItem">${d.toLocaleString()}</div>`
})

}

function updateStats(){

let smokeLogs=JSON.parse(localStorage.getItem("smokeLogs"))||[]
let drinkLogs=JSON.parse(localStorage.getItem("drinkLogs"))||[]

let today=new Date()
today.setHours(0,0,0,0)

let todayCount=0

smokeLogs.forEach(t=>{
if(t>today.getTime()){
todayCount++
}
})

document.getElementById("todaySmoke").innerText=todayCount

let week=7*24*60*60*1000
let now=Date.now()

let weekCount=0

drinkLogs.forEach(t=>{
if(now-t<week){
weekCount++
}
})

document.getElementById("weekDrink").innerText=weekCount

}

function update(){

let smokeStart=localStorage.getItem("smokeStart")
let drinkStart=localStorage.getItem("drinkStart")

if(!smokeStart){
smokeStart=Date.now()
localStorage.setItem("smokeStart",smokeStart)
}

if(!drinkStart){
drinkStart=Date.now()
localStorage.setItem("drinkStart",drinkStart)
}

let now=Date.now()

let smokeTime=getTime(now-smokeStart)
let drinkTime=getTime(now-drinkStart)

document.getElementById("smokeDay").innerText=smokeTime.day+"일"
document.getElementById("smokeHour").innerText=smokeTime.hour+"시간 "+smokeTime.min+"분"

document.getElementById("drinkDay").innerText=drinkTime.day+"일"
document.getElementById("drinkHour").innerText=drinkTime.hour+"시간 "+drinkTime.min+"분"

updateLogs()
updateStats()

}

setInterval(update,1000)
update()

</script>

<script>

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
}

</script>

</body>

</html>

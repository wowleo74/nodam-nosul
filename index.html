<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>노담 노술</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            margin: 0;
            font-family: -apple-system, sans-serif;
            background: #f0f2f5;
            color: #1a1a1b;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #3f6ed6, #2a4fa3);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 20px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .container {
            max-width: 400px;
            margin: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
            justify-content: center;
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            position: relative;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            max-height: 340px;
            text-align: center;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 8px; height: 100%;
        }
        .smoke-card::before { background: #ff6b6b; }
        .drink-card::before { background: #6c5ce7; }

        .title {
            font-size: 22px;
            font-weight: 800;
            color: #555;
            margin-bottom: 10px;
        }

        .time-display {
            font-size: clamp(30px, 9vw, 40px);
            font-weight: 900;
            color: #222;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        /* '오늘 0개'를 크게 강조한 스타일 */
        .highlight-stat {
            font-size: 34px;
            font-weight: 900;
            margin: 15px 0;
        }
        .smoke-text { color: #ff6b6b; }
        .drink-text { color: #6c5ce7; }

        .sub-info {
            font-size: 16px;
            color: #888;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto;
        }

        .button {
            padding: 16px;
            border-radius: 18px;
            text-align: center;
            font-weight: 800;
            font-size: 17px;
            cursor: pointer;
            border: none;
            transition: transform 0.1s;
        }

        .button:active { transform: scale(0.96); }

        .main-btn { color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .smoke-btn { background: #ff6b6b; }
        .drink-btn { background: #6c5ce7; }

        .reset-btn {
            background: transparent;
            color: #ccc;
            font-size: 13px;
            text-decoration: underline;
            padding: 5px;
        }
    </style>
</head>
<body>

<div class="header">노담 · 노술</div>

<div class="container">
    <div class="card smoke-card">
        <div class="title">🚭 금연 시간</div>
        <div class="time-display" id="smokeTime">0일 00:00:00</div>
        
        <div class="highlight-stat smoke-text">
            오늘 🚬 <span id="todaySmoke">0</span>개
        </div>
        
        <div class="sub-info">최근 7일간 총 <span id="weekSmoke">0</span>개</div>
        
        <div class="btn-group">
            <button class="button main-btn smoke-btn" onclick="recordSmoke()">🚬 방금 피웠음</button>
            <button class="button reset-btn" onclick="resetSmoke()">🔄 기록 초기화</button>
        </div>
    </div>

    <div class="card drink-card">
        <div class="title">🍺 금주 기간</div>
        <div class="time-display" id="drinkDay">0일째</div>
        
        <div class="highlight-stat drink-text">
            최근 7일 🍺 <span id="weekDrink">0</span>회
        </div>
        
        <div class="sub-info" id="lastDrinkInfo">기록 없음</div>
        
        <div class="btn-group">
            <button class="button main-btn drink-btn" onclick="recordDrink()">🍺 방금 마셨음</button>
            <button class="button reset-btn" onclick="resetDrink()">🔄 기록 초기화</button>
        </div>
    </div>
</div>

<script>
    function getTime(ms) {
        let sec = Math.floor(ms / 1000);
        let min = Math.floor(sec / 60);
        let hour = Math.floor(min / 60);
        let day = Math.floor(hour / 24);
        return { day, hour: hour % 24, min: min % 60, sec: sec % 60 };
    }

    function recordSmoke() {
        if(navigator.vibrate) navigator.vibrate(40);
        let now = Date.now();
        let logs = JSON.parse(localStorage.getItem("smokeLogs")) || [];
        logs.push(now);
        localStorage.setItem("smokeLogs", JSON.stringify(logs));
        localStorage.setItem("smokeStart", now);
        update();
    }

    function recordDrink() {
        if(navigator.vibrate) navigator.vibrate(40);
        let now = Date.now();
        let logs = JSON.parse(localStorage.getItem("drinkLogs")) || [];
        logs.push(now);
        localStorage.setItem("drinkLogs", JSON.stringify(logs));
        localStorage.setItem("drinkStart", now);
        update();
    }

    function resetSmoke() {
        if(confirm("금연 기록을 초기화할까요?")) {
            localStorage.setItem("smokeStart", Date.now());
            localStorage.removeItem("smokeLogs");
            update();
        }
    }

    function resetDrink() {
        if(confirm("금주 기록을 초기화할까요?")) {
            localStorage.setItem("drinkStart", Date.now());
            localStorage.removeItem("drinkLogs");
            update();
        }
    }

    function update() {
        let smokeStart = parseInt(localStorage.getItem("smokeStart") || Date.now());
        let drinkStart = parseInt(localStorage.getItem("drinkStart") || Date.now());
        if(!localStorage.getItem("smokeStart")) localStorage.setItem("smokeStart", smokeStart);
        if(!localStorage.getItem("drinkStart")) localStorage.setItem("drinkStart", drinkStart);

        let now = Date.now();
        
        // 금연 시간 업데이트
        let s = getTime(now - smokeStart);
        document.getElementById("smokeTime").innerText = 
            `${s.day}일 ${String(s.hour).padStart(2, '0')}:${String(s.min).padStart(2, '0')}:${String(s.sec).padStart(2, '0')}`;
        
        // 금주 날짜 업데이트 (24시간 경과 기준)
        let dDay = Math.floor((now - drinkStart) / (24 * 60 * 60 * 1000));
        document.getElementById("drinkDay").innerText = `${dDay}일`;

        updateStats();
    }

    function updateStats() {
        let smokeLogs = JSON.parse(localStorage.getItem("smokeLogs")) || [];
        let drinkLogs = JSON.parse(localStorage.getItem("drinkLogs")) || [];
        let todayStart = new Date().setHours(0, 0, 0, 0);
        let weekAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);

        // 통계 갱신
        document.getElementById("todaySmoke").innerText = smokeLogs.filter(t => t > todayStart).length;
        document.getElementById("weekSmoke").innerText = smokeLogs.filter(t => t > weekAgo).length;
        document.getElementById("weekDrink").innerText = drinkLogs.filter(t => t > weekAgo).length;

        // 마지막 음주 날짜 표시
        if(drinkLogs.length > 0) {
            let last = new Date(drinkLogs[drinkLogs.length - 1]);
            document.getElementById("lastDrinkInfo").innerText = `마지막 기록: ${last.getMonth() + 1}/${last.getDate()}`;
        } else {
            document.getElementById("lastDrinkInfo").innerText = "기록 없음";
        }
    }

    setInterval(update, 1000);
    update();
</script>

</body>
</html>
